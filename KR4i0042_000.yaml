body:
  text: 提要文章精義一卷詩文評類臣等謹案文章精義世無傳本諸家書目亦皆不載惟永樂大典有之但題曰李耆卿撰而不著時代亦不知耆卿為何許人考焦竑經籍志有李塗文章精義二卷書名及李姓皆與此本相合則耆卿或塗之字歟載籍無徵其為一為二蓋莫之詳矣其論文多原本六經不屑屑于聲律章句而于工拙繁簡之間源流得失之辨皆一一如别白黑具有鑒裁其言蘇氏之文不離乎縱橫程氏之文不離乎訓詁持平之論破除洛蜀之門户尤南宋人所不肯言又世傳韓文如潮蘇文如海及春蠶作繭之説皆習用而昧其出處今檢核斯語亦具見于是書蓋其初本為世所傳誦故遺文剩語口授至今嗣以卷帙寥寥易于散佚沉晦者遂數百年今逢聖代右文得以復見于世亦其名言至理有不可磨滅者歟乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:4ed7ee89bfc062563e4a907c3cab2e712057fd9b7071193f043b5de76473398c
