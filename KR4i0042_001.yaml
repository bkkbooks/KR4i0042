body:
  text: 文章精義宋李耆卿撰易詩書儀禮春秋論語大學中庸孟子皆聖賢眀道經世之書雖非為作文設而千萬世文章從是出焉國語不如左傳左傳不如檀弓叙晉獻公驪姫申生一事繁簡可見孟子之辨計是非不計利害而利害未嘗不眀戰國策之辨計利害不計是非而二者胥失之莊子文字善用虛以其虛而虛天下之實太史公文字善用實以其實而實天下之虛莊子者易之變離騷者詩之變史記者春秋之變史記帝紀世家從二雅十五國風來八書從禹貢周官來李斯上秦始皇書論逐客起句即見事實最妙中間論物不出于秦而秦用之獨人才不出于秦而秦不用反覆議論痛快深得作文之法未易以人廢言也老子孫武子一句一語如串八寶珍瑰間錯而不斷文字極難學惟蘇老泉數篇近之心術春秋論之類是也韓非子文字絶妙賈誼政事書是論天下事有間架的賈讓治河䇿是論一事有間架的孟子就三綱五常內立議論其與人辨是不得巳莊子就三綱五常外立議論其與人辨是得已而不已義理有間矣然文字皆不可及二人同處齊梁不知如何不相見若相見其辨必然有可觀韓退之文學孟子不及左傳有逼真處如董晋行狀中兩假辭命是也栁子厚文學國語國語假全栁假碎句法却相似西漢諸傳髣佛似之歐陽永叔學韓退之諸篇皆以退之為祖加以姿態惟五代史過順宗實録逺甚青出于藍而青于藍也子瞻文學莊子入虛處似凌虛臺記清風閣記之類是也戰國䇿論利害處似䇿略䇿别䇿斷之類是也史記終篇惟作他人說末後自已只說一句表忠觀碑之類是也楞嚴經魚枕冠頌之類是也子瞻文字到窮處便濟之以此一著所以千萬人過他關不得曽子固文學劉向平平說去亹亹不斷最淡而古但劉向老子固嫩劉向簡子固煩劉向枯槁子固光潤耳韓如海栁如泉歐如瀾蘇如潮司馬子長文字一二百句做一句下韓退之三五十句做一句下蘇子瞻亦然初不難學但長句中轉得意去便是好文字若一二百句三五十句只說得一句則冗矣孟子譏蚳蛙不諫卒以諫顯退之譏陽城不諫陽城卒以諫顯歐陽永叔譏范仲淹不諫范仲淹卒以諫顯三事相類然孟子數語而已退之費多少糾說永叔步驟退之而微不及古今文字優劣于此可見退之雖時有譏諷然大體正子厚發之以憤激永叔發之以感慨子瞻兼憤激感慨發之以諧謔讀栁蘇文方知韓文不可及文章不難于巧而難于拙不難于曲而難于直不難於細而難于粗不難于華而難于質可為智者道難與俗人言也司馬子長文拙於春秋內外傳而力量過之葉正則之文巧于韓栁歐蘇而力量不及文字請客對主極難獨子瞻放鶴亭記以酒對鶴大意謂清閒者莫如鶴然衛懿公好鶴則亡其國亂德者莫如酒然劉伶阮籍之徒反以酒全其真而名後世南面之樂豈足以易隱居之樂哉鶴是主酒是客請客對主分外精神又歸得放鶴亭隱居之意然須是前面嵌飲酒二字方入得來亦是一格退之平淮西碑是學舜典畫記是學顧命退之諸文多有功于吾道有補於世教獨衢州徐偃王碑一篇害義蓋穆天子在上偃王敢受諸侯朝是賊也退之乃許之以仁豈不謬哉永叔醉翁亭記結云太守謂誰廬陵歐陽修也是學詩采蘋篇誰其尸之有齊季女二句傳體前叙事後議論獨圬者王承福傳叙事論議相間頗有太史公伯夷傳之風孟子公孫丑下首章起句謂天時不如地利地利不如人和下面分三假第一假說天時不如地利第二假說地利不如人和第三假却専說人和而歸之得道者多助一節髙似一節此是作文中大法度也子瞻喜雨亭記結云太空冥冥不可得而名吾以名吾亭是化無為有凌虛臺記結云蓋世有足恃者而不在乎臺之存亡也是化有為無文字有反類尊題者子瞻秋陽賦先說夏潦之可憂却說秋陽之可喜絶妙若出文選諸人手則通篇說秋陽漸無餘味矣班孟堅叙霍光廢昌邑王讀至一半太后曰止為人臣子當悖亂如是耶再讀畢奏此假最妙載一時君臣堪畫盧同月蝕詩膾炙人口其實大東後二章耳詩雲漢有耗斁下土寧丁我躬之句退之永叔禱雨文遂各演作一篇其實皆自雲漢來然不逮遠矣孟子辨百里奚一假辭理俱到健讀數遍使人神爽飛越子瞻萬言書是步驟賈誼治安䇿然虛文有餘實事不足去誼逺矣陸宣公文字不用事而句語鏗鏘法度嚴整議論切當事情眀白得臣告君之體作世外文字須換過境界莊子寓言是空境界文字靈均九歌之類是鬼境界文字宋玉招魂亦然子瞻大悲閣記之類是佛境界文字魚枕冠頌亦自楞嚴經來芙蓉城黃鶴樓詩之類是鬼仙境界文字上清宫辭之類是仙境界文字惟退之不然一切以正大行之未嘗造妖揑怪此其所以不可及六經是治世之文左傳國語是衰世之文書平王之命一篇巳見衰世氣象戰國䇿是亂世之文唐人文字多是界定假落做所以死惟退之一片做所以活栁子厚文字便有界畫得斷者退之張中丞傳後叙云翰以文學自名為此傳頗詳密然尚恨有闕者不為許逺立傳又不載雷萬春事俗本誤耳前半篇是說巡逺後半篇是南霽雲即不及雷萬春事三字誤無疑堯典命羲和才數句耳七月便詳似堯典月令又詳似七月而病處極多然堯典分時月令分月其為文也易七月顛倒月分而以衣食為脉絡其為文也難此詩與周人之文不類原道送文暢師序等作闢佛老尊孔孟正是韓文與六經相表裏處非止學其聲響而已送文暢師序退之闢浮屠子厚佞浮屠子厚不及退之論史書子厚不恤天刑人禍退之深畏天刑人禍退之不及子厚退之諸墓志一人一樣絶妙退之志樊宗師墓其不蹈襲前人一言一句蓋與鑿鑿乎陳言之務去戞戞乎其難哉意適相似所以深喜之然銘謂文從字順各識職則宗師之文文不從字不順者多矣亦微有不滿意退之志樊紹述其文似紹述志栁子厚其文似子厚春蠶作繭見物即成性極巧子瞻作醉白堂記一假是說魏公之所有樂天之所無一假是樂天之所有又魏公之所無一假是樂天魏公之所同方才說是為韓魏公作醉白堂記王介甫乃謂韓白優劣論不亦謬乎永叔晝錦堂記全用韓稚圭晝錦堂詩意子瞻灔澦堆賦辭到天慶觀乳泉賦理到西漢制度散見諸傳中此是孟堅筆力歐陽永叔五代史贊首必有嗚呼二字固是世變可歎亦是此老文字遇感慨處便精神禹貢簡而盡山水田土貢賦草朩金革物産叙得皆盡後叙山脉一假水脉一假五服一假更有條而不紊周禮職方氏冗而踈左傳史記西漢叙戰陳堪畫文字須有數行不整齊處須有數行整齊處意對處文却不必對文對處意却著對文有圓有方韓文多圓栁文多方蘇文方者亦少唯上神宗萬言書代張方平諫用兵書數篇方圓者多退之琴操平淡而味長子厚鐃歌鼓吹曲險怪而意到退之墓志篇篇不同蓋相題而施設也子厚墓志千篇一律資治通鑑是續左傳綱目是續春秋真希元集文章正宗分作四體辭命一也議論一也叙事一也詩賦一也井然有條史遷項籍傳最好立義帝以後一日氣魄一日殺義帝以後一日衰颯一日是一篇大綱領至其筆力馳驟處有喑嗚叱咤之風班固設問答最弱如西都責東都之類至子瞻後杞菊賦起句云吁嗟先生誰使坐堂上稱太守便是風采百倍子瞻表忠觀碑終篇述趙清獻公奏不增損一字是學漢書但王介甫以為諸侯王年表則非也吕相絶秦書雖誣秦然文字自佳莊子胠篋篇辭理俱到不讀莊子秋水見識終不宏濶佛是掃除事障禪是掃除理障熟讀楞嚴經自見維摩詰經亦有作文法三十二菩薩各說不二法門此未得不二法門者也維摩默然不說不二法門者乃真得不二法門者也子厚晉問微用此體歐陽永叔豐樂亭記之類能畫出太平氣象禇少孫史記稱禇先生者是也學太史公句句相似只是成假不相似子厚學國語假假都似只是成篇不似學文切不可學人言語文中子所以不及諸子為要學夫子言語故也論語氣平孟子氣激莊子氣樂楚辭氣悲史記氣勇漢書氣怯文字順易而逆難六經都順惟莊子戰國䇿逆韓栁歐蘇順封建論一篇逆惟蘇眀允逆子瞻或順或逆然不及眀允處極多文字有終篇不見主意結句見主意者賈誼過秦論仁義不施而攻守之勢異也韓退之守戒在得人之類是也韓退之闢佛是說吾道有來歷浮屠無來歷不過辨邪正而已歐陽永叔闢佛乃謂修其本以勝之吾道既勝浮屠自息此意髙于退之百倍文字起句發意最好李斯上秦始皇逐客書起句至矣盡矣不可以加矣張伯玉作六經閣記謂六經閣者諸子百家皆在焉不書尊經也亦是起句發意但以下筆力差乏唐子西文極莊重縝密雖幅尺稍狹無長江大河一㵼千尺之勢然最利初學李邦直勢原只一勢字法原只一法字演出數千言所謂一莖草化為丈六金身者惜文字斷續然亦是一法唐代宗時有晉州男子郇謨者上三十字條陳利害一字是一件事如團字是說團練使之類謨自知之他人不喻也吾謂世之作文務要﨑嶇隱奧辭不足以達意者皆郇謨之徒也胡致堂文字就事論理理盡而辭止而氣極不衰雖不必調弄文法自然見有不可及處子厚文不如退之退之詩不如子厚學楚辭者多未若黃魯直最得其妙魯直諸賦及他文愈小愈工但作長篇苦于氣短又且句句要用事此其所以不能如長江大河也樂毅答燕王書孔眀出師表不必言忠而讀之可想見其忠李令伯陳情表不必言孝而讀之可想見其孝杜甫詩之忠山谷詩之孝亦然杜子美哀江頭妙在渭水東流劔閣深去住彼此無消息二句眀皇在蜀肅宗在秦一去一住兩無消息有天下而不得養其父此情何如耶父子之際人所難言子美獨能言之此其所以不可及非但細栁新蒲之感而已詩生民篇如廬山瀑布泉一氣輸寫直下略無回顧自厥初生民至以迄于今只是一意盧同月蝕詩韓退之刪改耳謂之效玉川子作何耶文章有短而轉折多氣長者韓退之送董邵南序王介甫讀孟嘗君傳是也有長而轉折少且氣短者盧裒西征記是也退之送孟東野序一鳴字發出許多議論自周禮梓人為筍簴來永叔山中樂三章贈惠勤望其出佛而歸儒持論甚正從退之送文暢序來石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也此假言沐浴佩玉者四而不覺其重復文字貴相題廣狹晦庵先生諸文字如長江大河滔滔汩汩動數千萬言而不足及作六君子贊人各三十二字盡得描畫其生平無缺無餘所謂相題者也做大文字須放胸襟如太虛始得大虛何心哉輕清之氣旋轉乎外而山川之流峙草朩之榮華禽獸昆蟲之飛躍游乎重濁渣滓之中而莫覺其所以然之故人放得此心廓然與太虛相似則一旦把筆為文凡世之治亂人之善惡事之是非某字合當如何書某句如何下某假當先某假當後殆如妍醜之在鑑如低昻之在衡决不至顛倒錯亂雖進而至于聖經之文可也今人時文動輒先立主意如詩賦論策不知私意偏見不足以包盡天下之道以及主意有所不通則又勉强遷就求以自伸其說若是者時文之陋態也可不戒哉選詩惟陶淵眀唐文惟韓退之自理趣中流出故渾然天成無斧鑿痕餘子止煉句煆字鏤刻工巧而已今人言詩動輒曰選言文動輒曰唐何泛然無别之甚西漢文字尚質司馬子長變得如此文終不失其為質唐文尚文韓退之變得如此質終不失其為文晦庵先生治經眀理宗二程而密於二程如易本義詩集傳小學書通鑑綱目之類皆青于藍而寒于水也但尋常文字多不及二程二程一句撒開做得晦庵千句萬句晦庵千句萬句揫斂來只作得二程一句雖世變愈降亦關天分不同然晦庵先生三百篇之後一人而已濓溪先生太極圖說通書眀道先生定性書伊川先生易傳序春秋傳序橫渠先生西銘是聖賢之文與四書諸經相表裏司馬子長是史官之文間有紕繆處退之是文人之文間有弱處然亦宇宙所不可無之文也晦庵詩音節從陶韋栁中來而理趣過之所以不可及蘇門文字到底脫不得縱橫氣習程門文字到底脫不得訓詁家風學文切不可學怪句先眀白正大務要十句百句只如一句貫串意脉說得通處儘管說去說得反覆竭處自然佳所謂行乎其所當行止乎其所不可不止真作文之大法也古人文字規模間架聲音節奏皆可學惟妙處不可學譬如幻師塑土朩偶耳目口鼻儼然似人而其中無精神魂魄不能活潑潑地豈人也哉此須是讀書時一心兩目痛下工夫務要得他好處則一旦臨文惟我操縱惟我捭闔此謂一莖草化丈六金身此自得之學難以筆舌傳也文章精義
