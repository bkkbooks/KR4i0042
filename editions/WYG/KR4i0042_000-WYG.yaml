body:
  text: 提要文章精義一巻詩文評類臣等謹案文章精義世無傳本諸家書目亦皆不載惟永樂大典有之但題曰李耆卿撰而不著時代亦不知耆卿為何許人考焦竑經籍志有李塗文章精義二巻書名及李姓皆與此本相合則耆卿或塗之字歟載籍無徵其為一為二盖莫之詳矣其論文多原本六經不屑屑于聲律章句而于工拙繁簡之間源流得失之辨皆一一如别白黒具有鑒裁其言蘇氏之文不離乎縱横程氏之文不離乎訓詁持平之論破除洛蜀之門户尤南宋人所不肯言又世傳韓文如潮蘇文如海及春蠶作繭之説皆習用而昧其出處今檢核斯語亦具見于是書盖其初本為世所傳誦故遺文剰語口授至今嗣以巻帙寥寥易于散佚沉晦者遂數百年今逢聖代右文得以復見于世亦其名言至理有不可磨滅者歟乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:0fa6c4263a7d95d65db1404886358c41046e1dc78bc2e24a787c60f9654cc169
